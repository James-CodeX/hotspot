services:
  nuxbill:
    container_name: nuxbill
    pull_policy: always
    build: ./
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Africa/Nairobi}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASS: ${DB_PASS:-}
      DB_SSL_MODE: ${DB_SSL_MODE:-DISABLED}
      DB_SSL_CA: ${DB_SSL_CA:-}